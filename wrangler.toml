# Common Thread Worker configuration.
#
# Two environments are defined:
#   - default (development): for local `wrangler dev` and personal staging
#   - production: for the publicly-deployed Worker
#
# Before first use:
#   1. Run `npm run db:create` to create the D1 database, then paste the
#      database_id below.
#   2. Run `npm run r2:create` to create the R2 bucket.
#   3. Run `npm run db:migrate:local` to apply the schema to local D1.
#   4. (Optional) Run `npm run keygen` to generate a signer keypair,
#      then add the public key to .dev.vars as SIGNER_PUBLIC_KEY.
#   5. Set up the reasoner secrets (see "Reasoner secrets" section below).
#   6. Run `npm run dev` to start the Worker locally.

name = "common-thread"
main = "implementation/workers/index.ts"
compatibility_date = "2025-09-01"
# Ed25519 in Web Crypto API became standard in Workers runtime in 2024.
# A compat date of 2025-09-01 (or any recent date) suffices. Bump to the
# latest stable date when convenient; Workers maintains backward compat
# for previously-pinned dates indefinitely.

# Default (development) bindings.

[[d1_databases]]
binding = "DB"
database_name = "common-thread"
database_id = "REPLACE_AFTER_RUNNING_db:create"
migrations_dir = "implementation/schema/migrations"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "common-thread-archive"

[vars]
ENVIRONMENT = "development"
# Reasoner model identifiers (§7.5.2). Override per environment as
# needed. Default to the methodology's two-model split:
#   TRIAGE_MODEL     cheap filter (§7.5.2 default behavior is to
#                    escalate on uncertainty)
#   REASONING_MODEL  full §7.4 attribution reasoning with the §7.2.3
#                    retry loop
TRIAGE_MODEL = "claude-haiku-4-5"
REASONING_MODEL = "claude-opus-4-7"

# -----------------------------------------------------------------------------
# Reasoner secrets (NOT defined in vars; managed out-of-band).
#
# AI_GATEWAY_URL    The Cloudflare AI Gateway base URL for the Anthropic
#                   provider, ending in '/anthropic'. Example:
#                   https://gateway.ai.cloudflare.com/v1/<account_id>/<gateway_id>/anthropic
#                   Treated as a secret because the URL embeds the
#                   Cloudflare account ID.
# ANTHROPIC_API_KEY Anthropic API key for the x-api-key header.
#
# Local development:
#   Add to .dev.vars (which is .gitignore'd):
#     AI_GATEWAY_URL=https://gateway.ai.cloudflare.com/v1/.../anthropic
#     ANTHROPIC_API_KEY=sk-ant-...
#
# Production:
#   wrangler secret put AI_GATEWAY_URL --env production
#   wrangler secret put ANTHROPIC_API_KEY --env production
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Production environment.
# Deploy with `wrangler deploy --env production`.
# -----------------------------------------------------------------------------

[env.production]
name = "common-thread-prod"

[env.production.vars]
ENVIRONMENT = "production"
TRIAGE_MODEL = "claude-haiku-4-5"
REASONING_MODEL = "claude-opus-4-7"

[[env.production.d1_databases]]
binding = "DB"
database_name = "common-thread-prod"
database_id = "REPLACE_AFTER_RUNNING_db:create:prod"
migrations_dir = "implementation/schema/migrations"

[[env.production.r2_buckets]]
binding = "ARCHIVE"
bucket_name = "common-thread-archive-prod"

# -----------------------------------------------------------------------------
# Optional: observability and limits.
# Uncomment and adjust if you want stricter resource limits.
# -----------------------------------------------------------------------------

# [observability]
# enabled = true

# [limits]
# cpu_ms = 30000
