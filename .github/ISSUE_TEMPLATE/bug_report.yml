name: Bug report
description: Something in the methodology paper or reference implementation misbehaves
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: >
        Thanks for the report. Common Thread is a **methodology paper** plus a
        **Cloudflare Workers reference implementation** for sockpuppet attribution
        from public behavioral signals. The paper (`paper/`) is the spec; the
        implementation (`implementation/`, `web/`) realizes it.

        **Do not paste secrets** in public issues: Anthropic API keys, AI Gateway
        URLs (they embed account IDs), Ed25519 signer private keys, Apify tokens,
        or full `.dev.vars` / `wrangler.toml` contents.

        **Do not include real investigation subjects** (account handles, platform
        IDs, scraped content). Describe behavior with redacted or synthetic
        examples.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What went wrong, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: >
        How to trigger it. Include API routes, npm scripts, or UI flows.
        Redact account identifiers and artifact content.
      placeholder: |
        1. `npm run dev` with MySQL + Hyperdrive configured per docs/SETUP.md
        2. POST /investigations/.../attribute with seeds A and B (redacted)
        3. Attribution run returns `declined_pairs` despite sufficient signals
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Area
      description: Which layer or component is affected?
      options:
        - Archive / manifest / signatures (R2)
        - Feature extractors (deterministic)
        - Attribution reasoner (triage / LLM / validator)
        - HTTP API (backend Worker routes)
        - Web frontend (`web/`)
        - Ingest / Apify pipeline
        - MySQL / Hyperdrive / schema
        - Deploy / wrangler / local setup
        - Methodology paper (`paper/`)
        - Tests / CI
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: `package.json` version (currently 0.1.x) or git commit SHA.
      placeholder: "0.1.0 or abc1234"
    validations:
      required: false
  - type: dropdown
    id: deployment
    attributes:
      label: Where you saw it
      options:
        - Local (`wrangler dev`)
        - My deployed backend Worker (dev env)
        - My deployed backend Worker (production env)
        - Web frontend only
        - Tests (`npm test` / vitest)
        - Paper or docs only (no runtime)
        - Not sure
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Logs / errors / context
      description: >
        `wrangler tail` output, test failure, validator retry messages, HTTP
        status + response body (redacted). For reasoning bugs, note
        `triage_model` / `reasoning_model` if relevant.
      render: shell
    validations:
      required: false
