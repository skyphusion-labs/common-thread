version: 2

# Dependency lifecycle. PRs only (never auto-merge); the maintainer reviews,
# and typecheck + the vitest suite gate every bump before it can land.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # Self-hosted extraction container (Dockerfile).
  - package-ecosystem: docker
    directories:
      - /containers/ingest-worker
    schedule:
      interval: weekly
    commit-message:
      prefix: build
