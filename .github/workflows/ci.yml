name: ci

# Full CI on push + same-repo PRs, all on GitHub-HOSTED runners:
#   - `ci`: typecheck + the Workers-pool test project. workerd needs a modern
#     glibc (>= 2.32) that the self-hosted box does not have, and nothing here
#     needs the box, so this runs hosted. Free on our GitHub Enterprise plan.
#   - `db-tests`: the DB-backed (node) test project against a MySQL service
#     container (issue #30): mysql2 cannot run in the Workers pool, so those
#     suites need a Node runtime + a real MySQL.
# The GitHub-hosted typecheck.yml stays as the safe path for untrusted fork PRs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo. No write scopes on the token.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # wrangler.toml is gitignored; the workers pool needs it to start Miniflare.
      - name: Materialize wrangler.toml
        run: cp wrangler.toml.example wrangler.toml
      - name: Workers-pool tests
        run: npx vitest run --project workers

  db-tests:
    # DB-backed (node) suites against a real MySQL. Hosted runner + service
    # container is the canonical pattern and isolates untrusted-PR code in
    # GitHub's sandbox (this repo is public).
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: common_thread_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      TEST_MYSQL_URL: mysql://root@127.0.0.1:3306/common_thread_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # wrangler.toml is gitignored but the shared vitest config loads it; the
      # node project does not use it, but the config file references it, so provide it.
      - name: Materialize wrangler.toml
        run: cp wrangler.toml.example wrangler.toml
      # Bootstrap squashed schema, then apply pending incremental migrations
      # (vivijure-style: idempotent, only versions ahead of schema_version run).
      - name: Apply schema and migrations
        run: npm run db:migrate
        env:
          MYSQL_URL: mysql://root@127.0.0.1:3306/common_thread_test
      - name: DB-backed (node) tests
        run: npx vitest run --project node-db

  pdfa-validation:
    # Sample PDF/A-2b render + veraPDF conformance check (§8.1.2 hardening).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install PDF toolchain
        run: sudo apt-get update && sudo apt-get install -y wkhtmltopdf ghostscript icc-profiles-free
      - name: Locate sRGB ICC profile
        run: find /usr/share/color /usr/share/ghostscript -iname '*srgb*.icc' 2>/dev/null | head -20 || true
      - name: veraPDF validate sample PDF/A-2b
        run: npm run validate:pdfa

  coverage:
    # Unified coverage across BOTH vitest projects in one process, so istanbul
    # merges per-file coverage maps (a line hit by the workers pool OR the
    # node-db project counts once). That needs the workers pool AND a real
    # MySQL, so this job carries the same MySQL 8 service container as db-tests.
    # It re-runs the suites a third time on purpose: `ci` and `db-tests` stay the
    # fast split pass/fail gates, this job is the single coverage source of
    # truth. Modest thresholds live in vitest.config.mts and fail the job on
    # regression. Hosted runner keeps untrusted-PR code in GitHub sandbox.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      code-quality: write
      pull-requests: write
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: common_thread_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      TEST_MYSQL_URL: mysql://root@127.0.0.1:3306/common_thread_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # wrangler.toml is gitignored; the workers pool needs it to start Miniflare.
      - name: Materialize wrangler.toml
        run: cp wrangler.toml.example wrangler.toml
      - name: Apply schema and migrations
        run: npm run db:migrate
        env:
          MYSQL_URL: mysql://root@127.0.0.1:3306/common_thread_test
      - name: Coverage (both projects, unified istanbul report)
        run: npm run test:coverage
      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: ./coverage/cobertura-coverage.xml
          language: javascript

  verify-package:
    # Package-level gate for @skyphusion/common-thread-verify (#188 A2/B1):
    # node:test suite (fixtures + keygen round-trip + script/bin parity) and the
    # clean-room MIT/AGPL import lint. Zero runtime deps -> no npm ci needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Verifier tests (node:test)
        working-directory: packages/common-thread-verify
        run: npm test
      - name: Clean-room import lint
        working-directory: packages/common-thread-verify
        run: npm run cleanroom
