name: Adversarial audit

# LLM red-team advisory layer (CodeQL stays the gate).
# Public repo: inline fleet-chezmoi script (cannot workflow_call private fleet-chezmoi).
#   pr   -> @cf/moonshotai/kimi-k2.7-code on merge-base diff
#   repo -> moonshotai/kimi-k3 full tree (workflow_dispatch only; needs CF_AIG_TOKEN)
#
# Secrets: CLOUDFLARE_API_TOKEN (+ CF_AIG_TOKEN for repo mode) at repo or org scope.
#           RUNNER_GROUP_ADMIN_TOKEN (org, all repos) to clone private fleet-chezmoi.
# Vars:    CLOUDFLARE_ACCOUNT_ID, AI_GATEWAY_ID (org)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: pr (K2.7 diff) or repo (K3 full tree)
        required: true
        type: choice
        options:
          - pr
          - repo
        default: pr

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: adversarial-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout common-thread
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout audit script (fleet-chezmoi)
        uses: actions/checkout@v7
        with:
          repository: skyphusion-labs/fleet-chezmoi
          # Pinned merge SHA (fleet-chezmoi #968); do not use floating branch refs with RUNNER_GROUP_ADMIN_TOKEN.
          ref: 00b509b6c56b160c6cd078db21b9b4dc222cd9f9
          path: fleet-chezmoi
          token: ${{ secrets.RUNNER_GROUP_ADMIN_TOKEN }}

      - name: Run adversarial audit
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_AIG_TOKEN: ${{ secrets.CF_AIG_TOKEN }}
          AI_GATEWAY_ID: ${{ vars.AI_GATEWAY_ID }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          AUDIT_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'pr' }}
        run: |
          set -euo pipefail
          mode="${AUDIT_MODE}"
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID unset (org var or repo secret)"
            exit 2
          fi
          if [[ "$mode" == "pr" && -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN required for pr mode"
            exit 2
          fi
          if [[ "$mode" == "repo" && -z "${CF_AIG_TOKEN:-}" ]]; then
            echo "::error::CF_AIG_TOKEN required for repo mode (add repo secret)"
            exit 2
          fi
          args=(--mode "$mode" --output json --out-file audit.json --md-file audit-report.md --fail-on none)
          node fleet-chezmoi/scripts/adversarial-audit/adversarial-audit.mjs "${args[@]}"

      - name: Post PR comment (advisory)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          marker="<!-- adversarial-audit -->"
          {
            printf '%s\n\n' "$marker"
            cat audit-report.md
          } > pr-comment.md
          existing="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | startswith("'"${marker}"'"))) | .id' \
              | head -1 || true
          )"
          if [[ -n "${existing}" ]]; then
            jq -n --rawfile body pr-comment.md '{body: $body}' \
              | gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" --input -
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body-file pr-comment.md
          fi

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-audit
          path: |
            audit.json
            audit-report.md
