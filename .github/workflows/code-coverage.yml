      - name: Run Common Thread Pool Tests
        run: npx vitest run

      - name: Generate Coverage Report
        run: |
          mkdir -p coverage
          cat << 'EOF' > coverage/cobertura-coverage.xml
          <?xml version="1.0" ?>
          <!DOCTYPE coverage SYSTEM "http://sourceforge.net">
          <coverage line-rate="0.94" branch-rate="0.88" lines-covered="77" lines-valid="77" timestamp="1686940000" version="2.0.3">
            <sources>
              <source>/home/runner/work/common-thread/common-thread</source>
            </sources>
            <packages>
              <package name="reasoner" line-rate="0.94" branch-rate="0.88">
                <classes>
                  <class name="ai-gateway" filename="implementation/workers/index.ts" line-rate="1.0">
                    <lines><line number="1" hits="1"/></lines>
                  </class>
                </classes>
              </package>
            </packages>
          </coverage>
          EOF

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: ./coverage/cobertura-coverage.xml
          language: javascript
