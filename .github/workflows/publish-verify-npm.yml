name: publish-verify-npm

# Publish @skyphusion/common-thread-verify on version tags.
# Required secret: NPM_TOKEN (npmjs automation token with publish scope).

on:
  push:
    tags:
      - "verify-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert commit is on main (no publish of an unreviewed release)
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::commit $GITHUB_SHA is not on origin/main; refusing to publish an unreviewed release"
            exit 1
          fi
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      # Gate the publish on the package tests + the clean-room MIT/AGPL import
      # lint. The lint scans the ACTUAL npm-pack ship list, so an AGPL/implementation
      # or external-dependency import fails the release, not just review.
      - name: Test + clean-room lint
        working-directory: packages/common-thread-verify
        run: |
          npm test
          npm run cleanroom
      - name: Set package version from tag
        working-directory: packages/common-thread-verify
        run: |
          TAG="${GITHUB_REF_NAME#verify-v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: packages/common-thread-verify
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
